<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Tarefa</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Sistema de Tarefas</h2>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html">Minhas Tarefas</a>
        <a href="create-task.html">Criar Tarefa</a>
        <a href="#">Configurações</a>
        <a href="index.html">Sair</a>
      </nav>
    </aside>
    
    <main class="main-content">
      <h1>Dashboard</h1>
      <h2>Editar Tarefa</h2>
      
      <div class="task-details-card">
        <form action="dashboard.html" method="get">
          <div class="form-group">
            <label for="title">Título da Tarefa</label>
            <input type="text" id="title" name="title" value="Revisar proposta do cliente" required>
          </div>
          <div class="form-group">
            <label for="description">Descrição</label>
            <textarea id="description" name="description">Verificar os valores e o escopo do projeto antes de enviar para o cliente. Focar na cláusula 5.3 sobre prazos de entrega.</textarea>
          </div>
          <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status">
              <option value="pendente" selected>Pendente</option>
              <option value="em_andamento">Em andamento</option>
              <option value="concluido">Concluído</option>
            </select>
          </div>
          <div style="display: flex; gap: 1rem; justify-content: flex-end; flex-wrap: wrap;">
            <button type="submit" class="btn btn-primary">Salvar Alterações</button>
            <a href="dashboard.html" class="btn btn-secondary">Cancelar</a>
            <button type="button" class="btn btn-danger" onclick="alert('Tarefa excluída (simulação)!'); window.location.href='dashboard.html';">Excluir Tarefa</button>
          </div>
        </form>
      </div>
      
      <footer>
        © 2026 Projeto Acadêmico
      </footer>
    </main>
  </div>
</body>
</html>
